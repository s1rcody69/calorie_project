{% extends 'calorie_tracker/base.html' %}
{% block content %}

<div class="bg-gray-900 rounded-2xl p-6 border border-gray-800 max-w-md mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.172-8.172z"/></svg>
        <h2 class="text-lg font-semibold">Edit — {{ item.name }}</h2>
    </div>
    <form method="POST">
        {% csrf_token %}
        <div class="flex flex-col gap-4">
            <div>
                <label class="text-xs text-gray-400 mb-1 block">Food Name</label>
                <input type="text" name="name" value="{{ form.name.value }}" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-xs text-gray-400 mb-1 block">Calories (kcal)</label>
                <input type="number" name="calories" value="{{ form.calories.value }}" required min="1"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Save Changes
                </button>
                <a href="{% url 'index' %}"
                    class="flex-1 text-center bg-gray-800 hover:bg-gray-700 text-gray-300 py-2 rounded-lg text-sm font-semibold transition">
                    Cancel
                </a>
            </div>
        </div>
    </form>
</div>

{% endblock %}
